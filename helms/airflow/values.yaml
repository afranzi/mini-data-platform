# Official Apache Airflow chart (1.22.0 / Airflow 3.2.2) values — wrapper-chart
# pattern: everything nests under the `airflow:` alias (the dependency name).
# Ported from the community airflow-helm schema in Story 2.3.
airflow:
  executor: CeleryExecutor
  airflowVersion: "3.2.2"

  images:
    airflow:
      repository: apache/airflow
      tag: "3.2.2-python3.12"

  # --- Secrets (Terraform-managed, Story 2.1) ---
  # Chart reads keys: `fernet-key`, `api-secret-key` (airflow-config-credentials)
  # and `connection` (airflow-metadata). JWT is chart-auto-generated (>=1.17).
  fernetKeySecretName: airflow-config-credentials
  apiSecretKeySecretName: airflow-config-credentials
  data:
    metadataSecretName: airflow-metadata
    # CeleryExecutor needs a result backend (the chart does NOT derive it from
    # metadataSecretName). Points at a TF-managed secret whose `connection` key is
    # `db+postgresql://mini:<pw>@postgres-postgresql.data.svc.cluster.local:5432/mini_data_platform`.
    # The `airflow-result-backend` secret is created in Story 2.6 (Terraform).
    resultBackendSecretName: airflow-result-backend

  # Embedded chart Postgres is OFF — Postgres runs as its own `postgres` ArgoCD app.
  postgresql:
    enabled: false

  # CeleryExecutor broker — Redis, no persistence (local).
  redis:
    enabled: true
    persistence:
      enabled: false

  # Airflow config, keyed by section (official schema; not flat AIRFLOW__ env).
  config:
    core:
      # Airflow 3 SimpleAuthManager (overrides the chart's FAB default).
      auth_manager: "airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager"
      simple_auth_manager_users: "admin:admin"
      load_examples: 'False'
      max_active_runs_per_dag: 1
      dags_are_paused_at_creation: 'True'
    api:
      base_url: "https://airflow.data"
    database:
      load_default_connections: 'False'
    logging:
      remote_logging: 'False'

  # SimpleAuth has no FAB users table -> no create-user job.
  createUserJob:
    enabled: false

  # DB migrate as an ArgoCD sync-hook (no Helm hooks) — FR12/FR21.
  migrateDatabaseJob:
    enabled: true
    useHelmHooks: false
    applyCustomEnv: false
    jobAnnotations:
      argocd.argoproj.io/hook: Sync

  # --- Airflow 3 component topology (FR8) with conservative local sizing ---
  scheduler:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1000m"
        memory: 1Gi

  apiServer:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1000m"
        memory: 1Gi

  dagProcessor:
    enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

  triggerer:
    enabled: true
    replicas: 1
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

  workers:
    replicas: 1
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 256m
        memory: 1Gi

  # DAGs via gitSync from the public repo (official keys: subPath / rev).
  dags:
    persistence:
      enabled: false
    gitSync:
      enabled: true
      repo: https://github.com/afranzi/mini-data-platform.git
      subPath: airflow
      branch: main
      rev: HEAD

  # nginx ingress at airflow.data -> api-server (Airflow 3 serves the UI here).
  ingress:
    enabled: true
    apiServer:
      enabled: true
      ingressClassName: nginx
      path: "/"
      hosts:
        - name: airflow.data
